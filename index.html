<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Model — Box</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <canvas id="c"></canvas>
      <div class="chrome">
        <header class="panel hero">
          <p class="eyebrow">Interactive viewer</p>
          <h1>Box<span class="dot">.</span>glb</h1>
          <p class="sub">Drag to orbit · Scroll to zoom · Right-drag to pan</p>
        </header>
        <div class="panel loading" id="loading" aria-live="polite">
          <div class="loading-row">
            <span class="spinner" aria-hidden="true"></span>
            <span id="loading-text">Loading model…</span>
          </div>
          <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
          <p class="hint" id="loading-detail">Preparing scene</p>
        </div>
        <footer class="panel foot">
          <span class="badge">Three.js</span>
          <span class="muted">Built for static hosting</span>
        </footer>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
